<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Suno Tracklist Text Archiver</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Suno Tracklist Text Archiver</h1>

    <label>
      Downloads subfolder
      <input id="subfolder" type="text" placeholder="SunoExports/Session_2026_03_28" />
    </label>

    <label>
      Archive filename prefix
      <input id="filenamePrefix" type="text" placeholder="suno_track_archive" />
    </label>

    <label>
      Scroll passes
      <input id="maxScrollPasses" type="number" min="1" max="500" value="40" />
    </label>

    <label>
      Idle settle ms
      <input id="idleMs" type="number" min="250" max="10000" value="1200" />
    </label>

    <label>
      Include row innerHTML
      <input id="includeInnerHtml" type="checkbox" checked />
    </label>

    <div class="buttons">
      <button id="scanBtn">Scan current tab</button>
      <button id="runBtn">Auto-scroll and archive text</button>
    </div>

    <pre id="status">Idle.</pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
